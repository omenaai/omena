events {
  worker_connections 1024;
}

http {
  # ── Upstream services ──────────────────────────────────────────────────────
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8787;
  }

  # ── WebSocket upgrade map ──────────────────────────────────────────────────
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Compression ────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml text/javascript;
  gzip_min_length 1000;
  gzip_proxied any;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # ── HTTP → HTTPS redirect (all domains) ───────────────────────────────────
  server {
    listen 80;
    server_name omenaai.com www.omenaai.com api.omenaai.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── omenaai.com — Next.js app ──────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name omenaai.com www.omenaai.com;

    ssl_certificate     /etc/nginx/ssl/live/omenaai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/omenaai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    if ($host = www.omenaai.com) {
      return 301 https://omenaai.com$request_uri;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }

  # ── api.omenaai.com — Hono backend ────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.omenaai.com;

    ssl_certificate     /etc/nginx/ssl/live/api.omenaai.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.omenaai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }
  }
}
